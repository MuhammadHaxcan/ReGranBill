<!-- Login / Print page: no sidebar -->
<ng-container *ngIf="isLoginPage || isPrintPage">
  <router-outlet></router-outlet>
</ng-container>

<!-- Authenticated layout: sidebar + main -->
<ng-container *ngIf="!isLoginPage && !isPrintPage">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="sidebar-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          <path d="M8 7h8M8 11h6"/>
        </svg>
      </span>
      <span class="sidebar-brand-text">ReGranBooks</span>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Vouchers</div>
        <a routerLink="/delivery-challan" routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact: false}" class="nav-item">
          <svg class="nav-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="3" y="2" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M6 6h6M6 9h6M6 12h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <span>Delivery Challan</span>
        </a>
        <a routerLink="/purchase-voucher" routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact: false}" class="nav-item">
          <svg class="nav-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="3" y="2" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M6 5.5h6M6 8.5h6M6 11.5h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M13 13l2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <span>Purchase Voucher</span>
        </a>
        <a routerLink="/journal-voucher" routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact: false}" class="nav-item">
          <svg class="nav-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 7h8M5 10h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M13 10v3M11.5 11.5h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span>Journal Voucher</span>
        </a>
        <a routerLink="/voucher-editor" routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact: false}" class="nav-item">
          <svg class="nav-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 6h8M5 9h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M11 12l1.2 1.2L14 11.2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Voucher Editor</span>
        </a>
      </div>

      <div class="nav-section" *ngIf="isAdmin">
        <div class="nav-section-label">Review</div>
        <a routerLink="/pending-challans" routerLinkActive="nav-active" class="nav-item">
          <svg class="nav-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="3" y="2" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M6 6h6M6 9h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <circle cx="13" cy="13" r="3" stroke="currentColor" stroke-width="1.2"/>
            <path d="M13 11.5v1.5h1.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          </svg>
          <span>Pending Challans</span>
        </a>
        <a routerLink="/pending-purchases" routerLinkActive="nav-active" class="nav-item">
          <svg class="nav-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="3" y="2" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M6 6h6M6 9h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <circle cx="13" cy="13" r="3" stroke="currentColor" stroke-width="1.2"/>
            <path d="M13 11.5v1.5h1.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          </svg>
          <span>Pending Purchases</span>
        </a>
      </div>

      <div class="nav-section" *ngIf="isAdmin">
        <div class="nav-section-label">Reports</div>
        <a routerLink="/soa" routerLinkActive="nav-active" class="nav-item">
          <svg class="nav-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M3 3h12v12H3z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
            <path d="M3 7h12M7 7v8" stroke="currentColor" stroke-width="1.4"/>
            <path d="M10 10h3M10 13h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span>Statement</span>
        </a>
        <a routerLink="/master-report" routerLinkActive="nav-active" class="nav-item">
          <svg class="nav-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4" fill="none"/>
            <path d="M2 6h14" stroke="currentColor" stroke-width="1.4"/>
            <path d="M6 6v10" stroke="currentColor" stroke-width="1.4"/>
            <path d="M9 10h4M9 13h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span>Master Report</span>
        </a>
      </div>

      <div class="nav-section" *ngIf="isAdmin">
        <div class="nav-section-label">Settings</div>
        <a routerLink="/metadata" routerLinkActive="nav-active" class="nav-item">
          <svg class="nav-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="3" width="6" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4"/>
            <rect x="10" y="3" width="6" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4"/>
            <rect x="2" y="10" width="6" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4"/>
            <rect x="10" y="10" width="6" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4"/>
          </svg>
          <span>Metadata</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <span class="user-avatar">{{ userInitial }}</span>
        <div class="user-info">
          <span class="user-name">{{ userName }}</span>
          <span class="user-role">{{ isAdmin ? 'Administrator' : 'Operator' }}</span>
        </div>
        <button class="btn-logout" (click)="logout()" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 2H4a2 2 0 00-2 2v8a2 2 0 002 2h2M10.5 11.5L14 8l-3.5-3.5M14 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</ng-container>

<!-- Global Toast -->
<div class="toast-container" *ngIf="toastVisible">
  <div class="toast" [class.toast-success]="toastType === 'success'" [class.toast-error]="toastType === 'error'" [class.toast-info]="toastType === 'info'">
    <span class="toast-icon">
      <ng-container *ngIf="toastType === 'success'">&#x2714;</ng-container>
      <ng-container *ngIf="toastType === 'error'">&#x2716;</ng-container>
      <ng-container *ngIf="toastType === 'info'">&#x2139;</ng-container>
    </span>
    <span class="toast-message">{{ toastMessage }}</span>
    <button class="toast-close" (click)="dismissToast()">&times;</button>
  </div>
</div>
