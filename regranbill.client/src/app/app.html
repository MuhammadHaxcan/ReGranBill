<!-- Login / Print page: no sidebar -->
<ng-container *ngIf="isLoginPage || isPrintPage">
  <router-outlet></router-outlet>
</ng-container>

<!-- Authenticated layout: sidebar + main -->
<ng-container *ngIf="!isLoginPage && !isPrintPage">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="sidebar-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          <path d="M8 7h8M8 11h6"/>
        </svg>
      </span>
      <span class="sidebar-brand-text">ReGranBooks</span>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section" *ngFor="let group of visibleGroups">
        <button class="nav-group-toggle" (click)="toggleGroup(group.group)">
          <span class="nav-section-label">{{ group.label }}</span>
          <svg class="nav-chevron" [class.open]="isGroupOpen(group.group)" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="nav-group-items" *ngIf="isGroupOpen(group.group)">
          <a *ngFor="let page of group.pages"
             [routerLink]="page.route"
             routerLinkActive="nav-active"
             [routerLinkActiveOptions]="{exact: false}"
             class="nav-item">
            <span>{{ page.label }}</span>
          </a>
        </div>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <span class="user-avatar">{{ userInitial }}</span>
        <div class="user-info">
          <span class="user-name">{{ userName }}</span>
          <span class="user-role">{{ userRoleLabel }}</span>
        </div>
        <button class="btn-logout" (click)="logout()" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 2H4a2 2 0 00-2 2v8a2 2 0 002 2h2M10.5 11.5L14 8l-3.5-3.5M14 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</ng-container>

<!-- Global Toast (sticky: stays until user dismisses or a newer toast replaces it).
     ngFor + trackBy on toastSeq forces the inner element to remount on every new
     toast so the CSS entry animation replays, giving a visible "swap" feel even
     when only the text changes between two toasts of the same type. -->
<div class="toast-container" *ngIf="toastVisible">
  <div *ngFor="let seq of [toastSeq]; trackBy: trackToastSeq"
       class="toast toast-swap"
       [class.toast-success]="toastType === 'success'"
       [class.toast-error]="toastType === 'error'"
       [class.toast-info]="toastType === 'info'">
    <span class="toast-icon">
      <ng-container *ngIf="toastType === 'success'">&#x2714;</ng-container>
      <ng-container *ngIf="toastType === 'error'">&#x2716;</ng-container>
      <ng-container *ngIf="toastType === 'info'">&#x2139;</ng-container>
    </span>
    <span class="toast-message">{{ toastMessage }}</span>
    <button class="toast-close" (click)="dismissToast()">&times;</button>
  </div>
</div>

<!-- Global Confirm / Info Modal -->
<div class="confirm-overlay" *ngIf="modalVisible" (click)="onModalClose()">
  <div class="confirm-modal" (click)="$event.stopPropagation()">
    <div class="confirm-icon-wrap" [class.confirm-icon-warn]="modalData?.type === 'confirm'" [class.confirm-icon-info]="modalData?.type === 'info'">
      <ng-container *ngIf="modalData?.type === 'confirm'">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </ng-container>
      <ng-container *ngIf="modalData?.type === 'info'">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </ng-container>
    </div>
    <h3 class="confirm-title">{{ modalData?.title }}</h3>
    <p class="confirm-message">{{ modalData?.message }}</p>
    <div class="confirm-actions">
      <ng-container *ngIf="modalData?.type === 'confirm'">
        <button class="confirm-btn confirm-btn-cancel" (click)="onModalClose()">{{ modalData?.cancelText }}</button>
        <button class="confirm-btn confirm-btn-danger" (click)="onModalConfirm()">{{ modalData?.confirmText }}</button>
      </ng-container>
      <ng-container *ngIf="modalData?.type === 'info'">
        <button class="confirm-btn confirm-btn-primary" (click)="onModalClose()">Close</button>
      </ng-container>
    </div>
  </div>
</div>
