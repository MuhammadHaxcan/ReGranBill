<div class="cmdp-overlay" *ngIf="open" (click)="onBackdropClick()">
  <div class="cmdp-modal" (click)="$event.stopPropagation()">
    <div class="cmdp-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="cmdp-search-icon">
        <circle cx="11" cy="11" r="7"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input #searchInput type="text" class="cmdp-search-input"
             placeholder="Search pages — type to filter, ↑/↓ to navigate, Enter to open"
             [(ngModel)]="query"
             (ngModelChange)="onQueryChange()"
             autocomplete="off" />
      <span class="cmdp-hint">Esc</span>
    </div>

    <div class="cmdp-results" *ngIf="results.length; else empty">
      <a *ngFor="let entry of results; let i = index; trackBy: trackByKey"
         [href]="entry.page.route"
         class="cmdp-result"
         [class.active]="i === activeIndex"
         (click)="$event.preventDefault(); go(entry.page, $event)"
         (mouseenter)="activeIndex = i">
        <div class="cmdp-result-main">
          <span class="cmdp-result-label">{{ entry.page.label }}</span>
          <span class="cmdp-result-group">{{ entry.page.groupLabel }}</span>
        </div>
        <div class="cmdp-result-desc" *ngIf="entry.page.description">{{ entry.page.description }}</div>
      </a>
    </div>
    <ng-template #empty>
      <div class="cmdp-empty">No matching pages.</div>
    </ng-template>
  </div>
</div>
