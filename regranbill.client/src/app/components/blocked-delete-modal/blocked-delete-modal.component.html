<div class="bd-overlay" *ngIf="visible" (click)="close()">
  <div class="bd-modal" (click)="$event.stopPropagation()">
    <div class="bd-icon-wrap">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>
    <h3 class="bd-title">{{ data?.title }}</h3>
    <p class="bd-message">{{ data?.message }}</p>

    <div class="bd-list-wrap" *ngIf="data?.vouchers?.length">
      <table class="bd-list">
        <thead>
          <tr>
            <th>Voucher #</th>
            <th>Date</th>
            <th>Type</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let v of data?.vouchers">
            <td>{{ v.voucherNumber }}</td>
            <td>{{ v.date }}</td>
            <td>{{ prettyType(v.voucherType) }}</td>
          </tr>
        </tbody>
      </table>
      <p class="bd-more" *ngIf="remaining > 0">+{{ remaining }} more</p>
    </div>

    <div class="bd-actions">
      <button class="bd-btn bd-btn-primary" (click)="close()">Close</button>
    </div>
  </div>
</div>
