<section class="card invoice-header">
  <div class="header-row">
    <div>
      <h1 class="invoice-title">Company Settings</h1>
      <p class="invoice-subtitle">Save company name, address, and logo in the backend</p>
    </div>
  </div>
</section>

<section class="card settings-card" *ngIf="!loading">
  <div class="settings-grid">
    <div class="settings-form">
      <div class="form-field">
        <label>Company Name</label>
        <input type="text" [(ngModel)]="companyName" class="form-input" />
      </div>

      <div class="form-field">
        <label>Address</label>
        <textarea [(ngModel)]="address" rows="4" class="form-input form-textarea"></textarea>
      </div>

      <div class="form-field">
        <label>Company Logo</label>
        <input type="file" accept="image/*" (change)="onLogoSelected($event)" class="form-input form-file" />
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" (click)="save()" [disabled]="saving">Save Settings</button>
      </div>
    </div>

    <div class="logo-panel">
      <div class="logo-panel-title">Logo Preview</div>
      <div class="logo-preview" *ngIf="previewUrl; else noLogo">
        <img [src]="previewUrl" alt="Company logo preview" />
      </div>
      <ng-template #noLogo>
        <div class="logo-placeholder">No logo uploaded</div>
      </ng-template>
    </div>
  </div>
</section>

<section class="card settings-card" *ngIf="!loading">
  <div class="settings-header">
    <h2>Vehicle Options</h2>
    <button class="btn btn-outline" (click)="addVehicle()">+ Add Vehicle</button>
  </div>

  <div class="vehicle-table-wrap" *ngIf="vehicles.length > 0; else noVehicles">
    <table class="vehicle-table">
      <thead>
        <tr>
          <th class="vehicle-col-name">Name</th>
          <th class="vehicle-col-number">Vehicle Number</th>
          <th class="vehicle-col-actions">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let vehicle of vehicles; let i = index; trackBy: trackVehicle">
          <td>
            <input type="text" class="form-input" [(ngModel)]="vehicle.name" placeholder="e.g. Mazhar Truck" />
          </td>
          <td>
            <input type="text" class="form-input" [(ngModel)]="vehicle.vehicleNumber" placeholder="e.g. ABC-1234" />
          </td>
          <td class="vehicle-actions">
            <button class="btn btn-outline btn-xs" (click)="moveVehicleUp(i)" [disabled]="i === 0">&#8593;</button>
            <button class="btn btn-outline btn-xs" (click)="moveVehicleDown(i)" [disabled]="i === vehicles.length - 1">&#8595;</button>
            <button class="btn btn-danger btn-xs" (click)="removeVehicle(i)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <ng-template #noVehicles>
    <p class="vehicle-empty">No vehicles saved yet.</p>
  </ng-template>

  <div class="form-actions">
    <button class="btn btn-primary" (click)="saveVehicles()" [disabled]="savingVehicles">Save Vehicles</button>
  </div>
</section>

<div class="loading-state" *ngIf="loading">
  <p>Loading company settings...</p>
</div>
