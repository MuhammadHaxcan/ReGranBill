<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
        <path d="M16 3c1.2 0 2.2.7 2.7 1.7l5.6 3.2c.5-.2 1-.3 1.5-.3 2 0 3.5 1.6 3.5 3.5 0 1.2-.6 2.2-1.5 2.8v6.4c.9.6 1.5 1.7 1.5 2.8 0 2-1.6 3.5-3.5 3.5-.6 0-1.1-.1-1.5-.4l-5.6 3.2c-.5 1-1.5 1.7-2.7 1.7s-2.2-.7-2.7-1.7l-5.6-3.2c-.5.2-1 .4-1.5.4-2 0-3.5-1.6-3.5-3.5 0-1.2.6-2.2 1.5-2.8v-6.4C5 12.3 4.5 11.2 4.5 10c0-2 1.6-3.5 3.5-3.5.6 0 1.1.1 1.5.3l5.6-3.2C15.8 3.6 16.8 3 18 3h-2z" fill="none" stroke="#1e2a3a" stroke-width="1.5"/>
        <path d="M10.5 12.5l5.5 3.2 5.5-3.2M16 15.7V22" stroke="#1e2a3a" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="16" cy="7" r="2" fill="#375ac8" stroke="#1e2a3a" stroke-width=".8"/>
        <circle cx="8" cy="11" r="2" fill="#375ac8" stroke="#1e2a3a" stroke-width=".8"/>
        <circle cx="24" cy="11" r="2" fill="#375ac8" stroke="#1e2a3a" stroke-width=".8"/>
        <circle cx="8" cy="21" r="2" fill="#375ac8" stroke="#1e2a3a" stroke-width=".8"/>
        <circle cx="24" cy="21" r="2" fill="#375ac8" stroke="#1e2a3a" stroke-width=".8"/>
        <circle cx="16" cy="25" r="2" fill="#375ac8" stroke="#1e2a3a" stroke-width=".8"/>
      </svg>
      <span class="brand-name">ReGranBooks</span>
    </div>

    <h1 class="login-title">Sign In</h1>
    <p class="login-subtitle">Enter your credentials to continue</p>

    <div class="error-message" *ngIf="error">{{ error }}</div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input
        type="text"
        class="form-control"
        placeholder="Enter username"
        [(ngModel)]="username"
        (keyup.enter)="login()"
        autofocus
      />
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input
        type="password"
        class="form-control"
        placeholder="Enter password"
        [(ngModel)]="password"
        (keyup.enter)="login()"
      />
    </div>

    <button class="btn btn-primary btn-login" (click)="login()" [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Sign In' }}
    </button>

    <div class="login-hint">
      <strong>Demo accounts:</strong> admin / Admin123! &nbsp;&middot;&nbsp; operator / Operator123!
    </div>
  </div>
</div>
