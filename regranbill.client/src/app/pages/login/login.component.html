<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        <path d="M8 7h8M8 11h6"/>
      </svg>
      <span class="brand-name">ReGranBooks</span>
    </div>

    <h1 class="login-title">Sign In</h1>
    <p class="login-subtitle">Enter your credentials to continue</p>

    <div class="error-message" *ngIf="error">{{ error }}</div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input
        type="text"
        class="form-control"
        placeholder="Enter username"
        [(ngModel)]="username"
        (keyup.enter)="login()"
        autofocus
      />
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input
        type="password"
        class="form-control"
        placeholder="Enter password"
        [(ngModel)]="password"
        (keyup.enter)="login()"
      />
    </div>

    <button class="btn btn-primary btn-login" (click)="login()" [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Sign In' }}
    </button>

  </div>
</div>
