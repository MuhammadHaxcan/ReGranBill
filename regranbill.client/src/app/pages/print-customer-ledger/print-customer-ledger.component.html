<div class="print-customer-ledger-container" *ngIf="!error && pdfUrl">
  <iframe [src]="pdfUrl" class="pdf-viewer" (load)="onIframeLoad()"></iframe>
</div>
<div class="print-customer-ledger-loading" *ngIf="loading && !error">
  <div class="spinner"></div>
  <p>Loading PDF...</p>
</div>
<div class="print-customer-ledger-error" *ngIf="error">{{ error }}</div>
