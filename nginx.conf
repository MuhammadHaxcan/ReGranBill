# Redirect www to non-www for consistent cookies
server {
    listen 80;
    server_name www.tradeledger.cloud;
    return 301 http://tradeledger.cloud$request_uri;
}

server {
    listen 80;
    server_name tradeledger.cloud;

    # Security headers handled by backend middleware - removed here to avoid duplicates

    # Frontend - React SPA
    location / {
        root /var/www/pureledger/frontend-build;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Backend API
    location /api/ {
        proxy_pass http://localhost:5104;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection keep-alive;

        # Important for cookies/XSRF to work
        proxy_pass_request_headers on;
        proxy_cookie_path /api /api;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
}
